<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Palabra Pro | Palabra del Día</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg: #121212; --card: #181818; --tile: #282828; --text: #ffffff;
            --text-dim: #b3b3b3; --spotify-green: #1DB954; --correct: #1ed760;
            --present: #c2a118; --absent: #3e3e3e; --font: 'Circular Sp', sans-serif;
            --key-bg: #3e3e3e;
        }

        [data-theme="light"] {
            --bg: #f8f9fa; --card: #ffffff; --tile: #e9ecef; --text: #121212;
            --text-dim: #535353; --absent: #7a7a7a; --key-bg: #d3d6da;
        }

        /* html y body configurados para permitir scroll si falta espacio vertical */
        html {
            height: 100%;
        }

        body {
            background-color: var(--bg); 
            color: var(--text);
            font-family: var(--font); 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column; 
            align-items: center; 
            min-height: 100%; /* Toma al menos el alto total del panel */
            overflow-y: auto; /* ACTIVA LA BARRA DE DESPLAZAMIENTO SI ES NECESARIO */
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
            box-sizing: border-box;
        }

        header { 
            width: 100%; 
            max-width: 500px; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-sizing: border-box; 
        }
        
        #challenge-banner {
            display: none; width: 100%; background: var(--spotify-green);
            color: white; padding: 10px; text-align: center; font-weight: bold;
            font-size: 0.85rem; z-index: 100;
        }

        .stats-container {
            display: flex; gap: 15px; background: var(--card); padding: 8px 25px; 
            border-radius: 30px; margin-bottom: 10px; font-size: 0.9rem;
        }

        /* El tablero se adapta al ancho y mantiene las proporciones cuadradas */
        #game-board { 
            display: grid; 
            gap: 8px; 
            width: 100%;
            max-width: 380px; /* Evita que sea gigantesco en pantallas anchas */
            margin: auto; /* Lo centra perfectamente en el espacio sobrante vertical */
            padding: 20px 15px;
            justify-content: center;
            box-sizing: border-box;
        }
        
        .tile { 
            width: 100%; 
            aspect-ratio: 1; /* Mantiene la proporción cuadrada automáticamente */
            background: var(--tile); 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: clamp(1.2rem, 6vw, 2rem); /* La letra se achica y agranda sola */
            font-weight: bold; 
            text-transform: uppercase;
            border: 2px solid transparent;
            box-sizing: border-box;
        }

        .tile[data-state="correct"] { background: var(--correct); color: white; }
        .tile[data-state="present"] { background: var(--present); color: white; }
        .tile[data-state="absent"] { background: var(--absent); color: white; }

        /* Teclado adaptable en la base */
        #keyboard { 
            width: 100%; 
            max-width: 550px; 
            padding: 10px 5px 25px 5px; /* Padding extra abajo para la barra de scroll */
            margin-top: auto; 
            box-sizing: border-box; 
        }
        
        .kb-row { 
            display: flex; 
            justify-content: center; 
            gap: clamp(2px, 1vw, 4px); 
            margin-bottom: 6px; 
            width: 100%; 
        }
        
        .key { 
            background: var(--key-bg); border: none; color: var(--text); 
            border-radius: 4px; 
            height: clamp(45px, 8vh, 55px); 
            flex: 1; font-weight: bold; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            outline: none;
            font-size: clamp(0.7rem, 2.5vw, 1rem);
            padding: 0;
            user-select: none;
        }
        .key.wide { flex: 1.6; font-size: clamp(0.6rem, 2vw, 0.75rem); }

        #overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 200; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; padding: 20px; overflow-y: auto; 
        }
        
        .btn-main { background: var(--spotify-green); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 0.9rem; width: 80%; max-width: 300px; }
        .btn-sec { background: transparent; color: white; border: 1px solid white; padding: 10px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.8rem; width: 80%; max-width: 300px; }
    </style>
</head>
<body data-theme="dark">

<div id="challenge-banner">
    🚀 RETO: ¡Lograron <span id="friend-score-val">0</span> pts!
    <button onclick="acceptChallenge()" style="background:white; color:black; border:none; border-radius:15px; margin-left:10px; cursor:pointer; font-weight:bold; padding:4px 12px; font-size:0.7rem;">ACEPTAR</button>
</div>

<header>
    <div style="font-weight:900;">PALABRA<span style="color:var(--spotify-green)">PRO</span></div>
    <button onclick="toggleTheme()" id="themeBtn" style="background:none; border:1px solid var(--text-dim); color:var(--text); padding:4px 10px; border-radius:15px; font-size:0.7rem; cursor:pointer; outline: none;">TEMA</button>
</header>

<div class="stats-container">
    <div><span id="ui-level" style="color:var(--spotify-green); font-weight:bold;">5L</span> <small>NIVEL</small></div>
    <div style="width:1px; background:var(--absent);"></div>
    <div><span id="ui-score" style="font-weight:bold;">0</span> <small>PTS</small></div>
</div>

<div id="game-board"></div>

<div id="keyboard">
    <div class="kb-row" id="kb1"></div>
    <div class="kb-row" id="kb2"></div>
    <div class="kb-row" id="kb3"></div>
</div>

<div id="overlay">
    <h1 id="over-title" style="color:white; margin-bottom:5px;"></h1>
    <p id="over-msg" style="color:var(--text-dim); margin-bottom: 15px;"></p>
    
    <button class="btn-main" onclick="shareChallenge()">COMPARTIR RETO 🔗</button>
    <button class="btn-sec" onclick="location.reload()">CERRAR</button>

    <div style="font-size: 0.7rem; color: #aaa; margin-top: 25px; text-transform: uppercase;">Próxima palabra en:</div>
    <div id="timer" style="font-size:1.8rem; font-weight:900; color:var(--spotify-green); margin:5px 0;">00:00:00</div>
</div>

<script>
    const DICTIONARY = {
        5: ["NUBES", "VALOR", "CIELO", "FUEGO", "PLAYA", "LIMON", "PIANO", "TEXTO", "BARCO"],
        6: ["MUSICA", "SONIDO", "ARTISTA", "GENERO", "BANDAS", "VIENTO", "CUERPO", "CAMINO", "ESTRELLA", "FUERZA"],
        7: ["PLAYLIST", "CANCIÓN", "PODCAST", "ESTRENO", "CULTURA", "TALENTO", "DESTINO", "ARMONIA", "MENSAJE", "TIEMPOS"]
    };

    let currentLevel = 5; 
    let targetWord = ""; 
    let guesses = []; 
    let currentGuess = "";
    let score = 0;
    let friendScore = null;
    const todayStr = new Date().toDateString();

    function init() {
        const params = new URLSearchParams(window.location.search);
        const shared = params.get('p');
        
        if (shared) {
            try {
                friendScore = parseInt(atob(shared));
                document.getElementById('challenge-banner').style.display = 'block';
                document.getElementById('friend-score-val').textContent = friendScore;
            } catch(e) {}
        } else {
            const lastPlayed = localStorage.getItem('palabraPro_lastPlayed');
            if (lastPlayed === todayStr) {
                finishGame(true, true);
                return;
            }
        }
        startNewLevel();
    }

    function acceptChallenge() {
        window.history.replaceState({}, document.title, window.location.pathname);
        document.getElementById('challenge-banner').style.display = 'none';
        score = 0; currentLevel = 5;
        startNewLevel();
    }

    function startNewLevel() {
        const daySeed = Math.floor(new Date().setHours(0,0,0,0) / 86400000);
        const list = DICTIONARY[currentLevel];
        targetWord = list[daySeed % list.length].toUpperCase();
        
        guesses = []; 
        currentGuess = "";
        document.getElementById('ui-level').textContent = currentLevel + 'L';
        document.getElementById('ui-score').textContent = score;
        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('game-board'); board.innerHTML = "";
        board.style.gridTemplateColumns = `repeat(${currentLevel}, 1fr)`;
        for (let i = 0; i < 6; i++) {
            for (let j = 0; j < currentLevel; j++) {
                const tile = document.createElement('div'); 
                tile.className = 'tile';
                if (i < guesses.length) {
                    tile.textContent = guesses[i][j];
                    tile.setAttribute('data-state', getLetterState(guesses[i], j));
                } else if (i === guesses.length) {
                    tile.textContent = currentGuess[j] || "";
                }
                board.appendChild(tile);
            }
        }
    }

    function getLetterState(guess, j) {
        if(guess[j] === targetWord[j]) return "correct";
        if(targetWord.includes(guess[j])) return "present";
        return "absent";
    }

    function handleInput(key) {
        if(document.getElementById('overlay').style.display === 'flex') return;
        if(key === 'ENTER') { if(currentGuess.length === currentLevel) submitGuess(); }
        else if(key === 'DEL' || key === 'BACKSPACE' || key === 'DELETE') { currentGuess = currentGuess.slice(0, -1); }
        else if(/^[A-ZÑ]$/.test(key) && currentGuess.length < currentLevel) { currentGuess += key; }
        renderBoard();
    }

    function submitGuess() {
        const guess = currentGuess; 
        guesses.push(guess);
        
        if (guess === targetWord) {
            score += (currentLevel * 20) + ((6 - guesses.length) * 10);
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            if (currentLevel < 7) { 
                currentLevel++; 
                setTimeout(startNewLevel, 1500); 
            } else { 
                if(!friendScore) localStorage.setItem('palabraPro_lastPlayed', todayStr);
                finishGame(true); 
            }
        } else if (guesses.length === 6) { 
            if(!friendScore) localStorage.setItem('palabraPro_lastPlayed', todayStr);
            finishGame(false); 
        }
        currentGuess = "";
    }

    function finishGame(win, locked = false) {
        document.getElementById('overlay').style.display = 'flex';
        const titleEl = document.getElementById('over-title');
        const msgEl = document.getElementById('over-msg');

        if (locked) {
            titleEl.textContent = "¡VUELVE MAÑANA!";
            msgEl.textContent = "Ya completaste el desafío de hoy.";
        } else {
            titleEl.textContent = win ? "¡LOGRADO!" : "FIN DEL JUEGO";
            let baseMsg = `Tus puntos: <b>${score}</b>`;
            
            if(friendScore !== null) {
                if (score > friendScore) {
                    baseMsg += `<br><span style="color:var(--correct)">🔥 ¡SUPERASTE EL RETO!</span><br><small>(Amigo: ${friendScore} pts)</small>`;
                } else if (score === friendScore) {
                    baseMsg += `<br><span style="color:var(--present)">🤝 ¡EMPATE TÉCNICO!</span><br><small>(Amigo: ${friendScore} pts)</small>`;
                } else {
                    baseMsg += `<br><span style="color:red">💀 NO SUPERASTE EL RETO</span><br><small>Te faltaron ${friendScore - score} pts para alcanzar los ${friendScore}</small>`;
                }
            } else {
                baseMsg += `<br>Nivel alcanzado: ${currentLevel}L`;
            }
            msgEl.innerHTML = baseMsg;
        }
        updateTimer();
        setInterval(updateTimer, 1000);
    }

    function shareChallenge() {
        const p = btoa(score);
        const url = `${window.location.origin}${window.location.pathname}?p=${p}`;
        navigator.clipboard.writeText(url).then(() => {
            alert("¡Link de reto copiado! Pásalo para ver si superan tus " + score + " puntos.");
        });
    }

    function updateTimer() {
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const diff = tomorrow - now;
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        document.getElementById('timer').textContent = `${h}:${m}:${s}`;
    }

    function toggleTheme() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        document.getElementById('themeBtn').blur();
    }

    const layout = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L","Ñ"], ["ENTER","Z","X","C","V","B","N","M","DEL"]];
    layout.forEach((row, i) => {
        const rEl = document.getElementById('kb' + (i+1));
        row.forEach(k => {
            const b = document.createElement('button'); 
            b.textContent = k; b.className = 'key' + (k.length > 1 ? ' wide' : '');
            b.onclick = (e) => { e.preventDefault(); handleInput(k); b.blur(); }; 
            rEl.appendChild(b);
        });
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); handleInput('ENTER'); }
        else { handleInput(e.key.toUpperCase()); }
    });

    init();
</script>
</body>
</html>
