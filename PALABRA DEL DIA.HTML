<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabra Pro | Palabra del Día</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
:root {
    --bg: #121212; --card: #181818; --tile: #282828; --text: #ffffff;
    --text-dim: #b3b3b3; --spotify-green: #1DB954; --correct: #1ed760;
    --present: #c2a118; --absent: #3e3e3e; --font: 'Circular Sp', sans-serif;
    --key-bg: #3e3e3e;
}

[data-theme="light"] {
    --bg: #f8f9fa; --card: #ffffff; --tile: #e9ecef; --text: #121212;
    --text-dim: #535353; --absent: #7a7a7a; --key-bg: #d3d6da;
}

/* ✅ BODY FIX */
body {
    background-color: var(--bg);
    color: var(--text);
    font-family: var(--font);
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    align-items: center;
    overflow-x: hidden;
    transition: background-color 0.3s, color 0.3s;
}

header {
    width: 100%;
    max-width: 500px;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
}

.theme-toggle {
    background: none;
    border: 1px solid var(--text-dim);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.7rem;
    font-weight: bold;
}

.streak-pop {
    color: #ff9800;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    background: rgba(255,152,0,0.1);
    border-radius: 20px;
}

/* ✅ BOARD RESPONSIVE */
#game-board {
    display: grid;
    gap: 8px;
    margin: 20px 0;
    width: 100%;
    max-width: 420px;
}

/* ✅ TILE RESPONSIVE */
.tile {
    width: 100%;
    aspect-ratio: 1/1;
    max-width: 60px;
    background: var(--tile);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1rem, 4vw, 1.6rem);
    font-weight: bold;
    text-transform: uppercase;
}

.tile[data-state="correct"] { background: var(--correct); color: white; }
.tile[data-state="present"] { background: var(--present); color: white; }
.tile[data-state="absent"] { background: var(--absent); color: white; }

/* ✅ KEYBOARD */
#keyboard {
    width: 100%;
    max-width: 500px;
    padding: 10px;
    margin-top: auto;
}

.kb-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 8px;
}

.key {
    background: var(--key-bg);
    border: none;
    color: var(--text);
    border-radius: 4px;
    height: clamp(40px, 8vw, 55px);
    flex: 1;
    font-weight: bold;
    cursor: pointer;
}

.key.wide { flex: 1.5; }

/* OVERLAY */
#overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}

.btn-main {
    background: var(--spotify-green);
    color: white;
    border: none;
    padding: 15px 40px;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
}

/* ✅ MOBILE FIX */
@media (max-width: 480px) {
    #game-board { gap: 5px; }
    .kb-row { gap: 3px; }
    #overlay h1 { font-size: 1.8rem; }
    #timer { font-size: 2rem; }
}
</style>
</head>

<body>

<header>
<div style="font-weight:900;">PALABRA<span style="color:var(--spotify-green)">PRO</span></div>
<div class="header-actions">
<button class="theme-toggle" onclick="toggleTheme()">TEMA</button>
<div class="streak-pop">🔥 <span id="ui-streak">0</span></div>
</div>
</header>

<div style="display:flex; gap:20px; background:var(--card); padding:10px 30px; border-radius:12px;">
<div style="text-align:center"><span id="ui-level">5L</span><small>NIVEL</small></div>
<div style="text-align:center"><span id="ui-score">0</span><small>PUNTOS</small></div>
</div>

<div id="game-board"></div>

<div id="keyboard">
<div class="kb-row" id="kb1"></div>
<div class="kb-row" id="kb2"></div>
<div class="kb-row" id="kb3"></div>
</div>

<div id="overlay">
<h1 id="over-title"></h1>
<p id="over-msg"></p>
<div id="timer">00:00:00</div>
<button class="btn-main" onclick="shareResults()">COMPARTIR</button>
</div>

<script>
const DICTIONARY = {
5:["NUBES","VALOR","CIELO","FUEGO","PLAYA"],
6:["MUSICA","SONIDO","ARTISTA"],
7:["PLAYLIST","CANCIÓN"]
};

let currentLevel=5,targetWord="",guesses=[],currentGuess="",score=0;

function startGame(){
targetWord=DICTIONARY[currentLevel][Math.floor(Math.random()*DICTIONARY[currentLevel].length)];
renderBoard();
}

function renderBoard(){
const board=document.getElementById('game-board');
board.innerHTML="";
board.style.gridTemplateColumns=`repeat(${currentLevel},1fr)`;

for(let i=0;i<6;i++){
for(let j=0;j<currentLevel;j++){
const tile=document.createElement('div');
tile.className='tile';

if(i<guesses.length){
tile.textContent=guesses[i][j];
tile.setAttribute('data-state',getState(guesses[i],j));
}else if(i===guesses.length){
tile.textContent=currentGuess[j]||"";
}

board.appendChild(tile);
}}
}

function getState(word,i){
if(word[i]===targetWord[i])return"correct";
if(targetWord.includes(word[i]))return"present";
return"absent";
}

function handleInput(k){
if(k==="ENTER"&&currentGuess.length===currentLevel)submit();
else if(k==="DEL")currentGuess=currentGuess.slice(0,-1);
else if(/^[A-ZÑ]$/.test(k)&&currentGuess.length<currentLevel)currentGuess+=k;
renderBoard();
}

function submit(){
guesses.push(currentGuess);
if(currentGuess===targetWord){alert("GANASTE");}
currentGuess="";
}

const layout=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L","Ñ"],["ENTER","Z","X","C","V","B","N","M","DEL"]];
layout.forEach((row,i)=>{
const r=document.getElementById('kb'+(i+1));
row.forEach(k=>{
const b=document.createElement('button');
b.textContent=k;
b.className='key'+(k.length>1?' wide':'');
b.onclick=()=>handleInput(k);
r.appendChild(b);
});
});

window.onkeydown=e=>handleInput(e.key.toUpperCase());

startGame();
</script>

</body>
</html>
